version: 1

project:
  name: adaptive-change-governance
  description: 可复用的 AI Coding Agent 变更治理与流程路由工具本体，默认配置保持行业无关
  baseline_level: L2

business_risk:
  criticality: 3
  financial_sensitivity: 3
  data_integrity: 3
  external_system_control: 3
  privacy: 3
  compliance: 3
  customer_impact: 3

engineering_health:
  automated_test_coverage: 2
  observability: 2
  rollback_capability: 3
  architecture_clarity: 3
  dependency_complexity: 2
  documentation_quality: 3

critical_domains:
  - financial-calculation
  - data-integrity
  - destructive-data-operation
  - public-interface
  - message-contract
  - database-schema
  - authentication
  - authorization
  - credentials
  - privacy-data
  - external-system-control
  - physical-device-control
  - guardrail-enforcement
  - risk-evaluation
  - workflow-gating
  - approval-state
  - repository-analysis
  - evidence-traceability
  - plugin-entrypoints

critical_paths:
  - assess command entry
  - evidence pack generation
  - hard guardrail application
  - risk level calculation
  - workflow plan generation
  - human approval gates

known_constraints:
  - hard guardrails must never be downgraded by model judgment
  - technical plans require workflow approval
  - implementation requires technical plan approval
  - keyword scanning has limited confidence for dynamic routes and implicit dependencies
  - all important judgments must be traceable to user input, code, git diff, risk profile, guardrails, or marked inference

default_human_gates:
  - workflow_plan_approval
  - technical_plan_approval
  - implementation_approval

audit_retention:
  audit_mode: gitignored
  retain_latest: 20
  retain_days: 30

