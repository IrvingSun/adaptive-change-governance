name: Change Governance

# Real enforcement lives here, not in the local hook. A PreToolUse hook only covers
# editing tools, can be turned off with ACG_HOOK_MODE, and does not exist on the
# Codex CLI — an agent with shell access can write around all of it. This job runs
# where the agent cannot write, and scores the diff from code facts alone.
#
# The check must be *clearable*, or it is useless as a required check: GitHub does
# not let a review approval override a failing required check, so a gate that simply
# failed on high risk would make every L3/L4 pull request unmergeable forever.
# Instead, a high-risk pull request fails until a human other than the author submits
# an approving review, then passes. That is why pull_request_review is a trigger —
# GitHub does not re-run pull_request workflows when a review is submitted.
#
# Make it binding: mark "governance-gate" a required status check on protected
# branches. A review approval is the one signal an agent cannot forge.

on:
  pull_request:
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the merge base with the target branch is reachable.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install PyYAML
      - name: Score pull request diff
        id: gate
        run: |
          set +e
          python bin/change-assess \
            --ci-gate "origin/${{ github.base_ref }}" \
            --ci-fail-level L3 \
            --ci-output gate-summary.md
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0 = pass, 3 = human review required. Any other code is a real tool or
          # config error and must fail here, not as a confusing error downstream.
          if [ "$code" -ne 0 ] && [ "$code" -ne 3 ]; then
            echo "::error::change-assess --ci-gate failed with exit code $code"
            exit "$code"
          fi
      - name: Publish summary
        if: always()
        run: |
          if [ -f gate-summary.md ]; then
            cat gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "The governance gate produced no summary; see the scoring step for the error." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Require human approval for high-risk changes
        if: steps.gate.outputs.exit_code == '3'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          # Count each reviewer's latest state only, and never the author's own.
          approvals=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.user.login != \"$PR_AUTHOR\")]
                  | group_by(.user.login) | map(last)
                  | map(select(.state == \"APPROVED\")) | length")
          if [ "${approvals:-0}" -ge 1 ]; then
            echo "Governance gate: review threshold reached, and ${approvals} human approval(s) are present."
          else
            echo "::error::This change reached the review threshold. It stays blocked until a human other than the author submits an approving review; the check re-runs automatically when that review is submitted."
            exit 1
          fi
