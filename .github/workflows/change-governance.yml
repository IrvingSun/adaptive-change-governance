name: Change Governance

# Gives every pull request one uniform, auditable risk verdict, scored server-side
# from code facts in the diff alone. This is step 2 of the ladder in README
# ("How much it actually holds").
#
# On its own this job is ADVISORY: it only affects merging once "governance-gate" is
# a required status check on protected branches (step 3). That is the normal setup —
# local hook + CI gate + required check — and it is enough for process governance,
# audit, and a merge-time risk review.
#
# The two layers below are free and need no configuration, but they answer a
# stronger threat model (step 4: a pull request rewriting the gate that judges it).
# Do not read them as prerequisites:
#
#   * the gate's code and rules are checked out from the BASE revision and run from
#     there against the pull request's tree, so rewriting ci_gate.py or
#     guardrails.yaml inside a pull request does not change how it is scored;
#   * that base-revision gate forces "review required" for any diff touching
#     GOVERNANCE_PATHS (see ci_gate.py).
#
# Those two layers live in this file, and for `pull_request` GitHub runs the
# workflow definition *from the pull request* — so this file is not its own trust
# anchor. Only .github/CODEOWNERS plus "Require review from Code Owners" closes
# that, and only if you decide you need step 4.

on:
  pull_request:
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-gate:
    runs-on: ubuntu-latest
    env:
      # github.base_ref is only populated for pull_request events; on
      # pull_request_review it is empty, which would make the base ref "origin/",
      # fail merge-base, and leave the check permanently unclearable. The payload
      # field is present for both events.
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Check out pull request (the thing being scored)
        uses: actions/checkout@v4
        with:
          # Full history so the merge base with the target branch is reachable.
          fetch-depth: 0
      - name: Check out governance tool from the base revision (the thing doing the scoring)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .governance-tool
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install PyYAML
      - name: Score pull request diff
        id: gate
        run: |
          set +e
          # Run the base revision's code, with the base revision's rules, against the
          # pull request working tree. Config paths must be absolute: change-assess
          # prefers the project's own .ai-governance/ when given a relative path,
          # which would hand the rules back to the pull request.
          #
          # Pin EVERY config that cli.py resolves through _config_path, not just the
          # ones that affect scoring. All five are loaded and validated before the
          # --ci-gate dispatch, so a pull request that breaks any of them fails the
          # gate with exit 2 — which no approval can clear.
          TOOL="$PWD/.governance-tool"
          python "$TOOL/bin/change-assess" \
            --ci-gate "origin/$BASE_REF" \
            --ci-fail-level L3 \
            --ci-output gate-summary.md \
            --risk-profile "$TOOL/.ai-governance/project-risk.yaml" \
            --guardrails "$TOOL/.ai-governance/guardrails.yaml" \
            --workflow-modules "$TOOL/.ai-governance/workflow-modules.yaml" \
            --risk-calibration "$TOOL/.ai-governance/risk-calibration.yaml" \
            --artifact-schemas "$TOOL/.ai-governance/artifact-schemas.yaml"
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0 = pass, 3 = human review required. Any other code is a real tool or
          # config error and must fail here, not as a confusing error downstream.
          if [ "$code" -ne 0 ] && [ "$code" -ne 3 ]; then
            echo "::error::change-assess --ci-gate failed with exit code $code"
            exit "$code"
          fi
      - name: Publish summary
        if: always()
        run: |
          if [ -f gate-summary.md ]; then
            cat gate-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "The governance gate produced no summary; see the scoring step for the error." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Require human approval for high-risk changes
        if: steps.gate.outputs.exit_code == '3'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          # Count each reviewer's latest state only, and never the author's own.
          approvals=$(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.user.login != \"$PR_AUTHOR\")]
                  | group_by(.user.login) | map(last)
                  | map(select(.state == \"APPROVED\")) | length")
          if [ "${approvals:-0}" -ge 1 ]; then
            echo "Governance gate: review threshold reached, and ${approvals} human approval(s) are present."
          else
            echo "::error::This change reached the review threshold. It stays blocked until a human other than the author submits an approving review; the check re-runs automatically when that review is submitted."
            exit 1
          fi
