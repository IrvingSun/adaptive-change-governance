name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install PyYAML mypy types-PyYAML
      - name: Type check
        run: mypy lib/adaptive_change_governance plugins/adaptive-change-governance/hooks/implementation_gate.py
      - name: Tests (includes plugin sync check)
        run: python test/test_phase1.py
